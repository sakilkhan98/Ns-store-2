<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS App Store | Developed by SakiL</title>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
            --gradient: linear-gradient(135deg, #38bdf8, #818cf8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 280px;
            background: var(--secondary-bg);
            height: 100vh;
            position: fixed;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--glass);
            transition: 0.4s;
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .logo-area img { width: 45px; border-radius: 12px; }
        .logo-area h2 { font-size: 22px; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-menu { list-style: none; flex-grow: 1; }
        .nav-item {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            color: var(--text-dim);
            font-weight: 500;
        }

        .nav-item i { font-size: 18px; }
        .nav-item:hover, .nav-item.active {
            background: var(--glass);
            color: var(--accent-color);
            transform: translateX(5px);
        }

        .dev-footer {
            background: var(--glass);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .dev-footer p { font-size: 12px; color: var(--text-dim); }
        .dev-footer b { color: var(--accent-color); font-size: 15px; }
        .tg-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--gradient);
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            margin-top: 12px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        /* --- Main Content --- */
        .main-content {
            margin-left: 280px;
            width: 100%;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .search-container {
            background: var(--secondary-bg);
            width: 50%;
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            border: 1px solid var(--glass);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .search-container input {
            background: none;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            margin-left: 15px;
            font-size: 15px;
        }

        /* --- Hero Banner --- */
        .hero {
            background: var(--gradient);
            height: 220px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 50px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .hero h1 { font-size: 36px; font-weight: 800; }
        .hero p { opacity: 0.9; max-width: 400px; margin-top: 5px; }

        /* --- App Cards Grid --- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .app-card {
            background: var(--secondary-bg);
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--glass);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .app-card:hover {
            transform: translateY(-10px);
            background: #273549;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .app-card img {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .app-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-card span { font-size: 12px; color: var(--text-dim); }

        .btn-download {
            background: var(--glass);
            color: var(--accent-color);
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            margin-top: 15px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .app-card:hover .btn-download {
            background: var(--accent-color);
            color: white;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: bold;
        }

        /* --- Modal --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--secondary-bg);
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            position: relative;
            border: 1px solid var(--glass);
        }

        .close-btn { position: absolute; right: 25px; top: 20px; font-size: 24px; cursor: pointer; color: var(--text-dim); }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar { left: -280px; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; padding: 20px; }
            .search-container { width: 80%; }
        }
    </style>
</head>
<body>

    <!-- Sidebar Menu -->
    <nav class="sidebar" id="sidebar">
        <div class="logo-area">
            <img src="https://cdn-icons-png.flaticon.com/512/888/888846.png" alt="Logo">
            <h2>NS Store</h2>
        </div>
        
        <ul class="nav-menu">
            <li class="nav-item active" onclick="filterApps('All')"><i class="fa fa-th-large"></i> Dashboard</li>
            <li class="nav-item" onclick="filterApps('Games')"><i class="fa fa-gamepad"></i> Games</li>
            <li class="nav-item" onclick="filterApps('Tools')"><i class="fa fa-tools"></i> Tools</li>
            <li class="nav-item" onclick="filterApps('Mod Apps')"><i class="fa fa-shield-virus"></i> Mod Apps</li>
        </ul>

        <div class="dev-footer">
            <p>Developed by</p>
            <b>SakiL</b>
            <a href="https://t.me/Sharechat_ns_098" target="_blank" class="tg-link">
                <i class="fab fa-telegram-plane"></i> Join Telegram
            </a>
        </div>
    </nav>

    <!-- Main Section -->
    <div class="main-content">
        <header>
            <div style="cursor:pointer; font-size: 24px;" onclick="toggleMenu()" id="menu-icon"><i class="fa fa-bars"></i></div>
            <div class="search-container">
                <i class="fa fa-search" style="color:var(--text-dim)"></i>
                <input type="text" id="search-input" placeholder="Search for premium apps..." oninput="searchApps()">
            </div>
            <div style="font-size: 20px; color: var(--accent-color);"><i class="fa fa-user-circle"></i></div>
        </header>

        <section class="hero">
            <h1>Premium Mods</h1>
            <p>Download the latest ad-free modded apps and premium games for free.</p>
        </section>

        <div class="section-header">
            <h2 id="cat-title">Featured Apps</h2>
            <i class="fa fa-ellipsis-h"></i>
        </div>

        <div class="app-grid" id="app-list">
            <!-- Apps will load here -->
        </div>
    </div>

    <!-- App Detail Modal -->
    <div class="modal" id="app-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // --- আপনার অ্যাপ ডাটা এখানে ---
        // ভবিষ্যতে নতুন অ্যাপ যোগ করতে চাইলে শুধু এই তালিকার ভেতরে কপি-পেস্ট করবেন।
        const apps = [
            {
                id: 1,
                name: "Spotify Premium",
                category: "Mod Apps",
                icon: "https://cdn-icons-png.flaticon.com/512/174/174872.png",
                version: "8.9.1",
                desc: "Enjoy ad-free music, unlimited skips, and high-quality audio streaming with Spotify Mod.",
                url: "https://apkpure.com/p/com.spotify.tv.android",
                badge: "Popular"
            },
            {
                id: 2,
                name: "PUBG Mobile Mod",
                category: "Games",
                icon: "https://cdn-icons-png.flaticon.com/512/8002/8002111.png",
                version: "3.1.0",
                desc: "High performance battle royale experience with advanced features.",
                url: "apks/pubg.apk",
                badge: "Hot"
            },
            {
                id: 3,
                name: "CapCut Pro",
                category: "Tools",
                icon: "https://cdn-icons-png.flaticon.com/512/5968/5968455.png",
                version: "10.4.0",
                desc: "Premium video editing tool without watermark and all effects unlocked.",
                url: "https://apkpure.com/p/com.lemon.lvoverseas",
                badge: "New"
            }
            // আরও অ্যাপ এখানে যোগ করুন...
        ];

        function displayApps(data) {
            const container = document.getElementById('app-list');
            container.innerHTML = "";
            data.forEach(app => {
                container.innerHTML += `
                    <div class="app-card" onclick="openDetails(${app.id})">
                        <span class="badge">${app.badge}</span>
                        <img src="${app.icon}" alt="${app.name}">
                        <h3>${app.name}</h3>
                        <span>v${app.version} • ${app.category}</span><br>
                        <button class="btn-download">Get App</button>
                    </div>
                `;
            });
        }

        function openDetails(id) {
            const app = apps.find(a => a.id === id);
            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <img src="${app.icon}" style="width:120px; border-radius:25px; margin-bottom:20px;">
                <h2 style="margin-bottom:10px;">${app.name}</h2>
                <p style="color:var(--accent-color); font-weight:bold; margin-bottom:15px;">Version ${app.version}</p>
                <p style="color:var(--text-dim); line-height:1.6;">${app.desc}</p>
                <a href="${app.url}" class="tg-link" style="margin-top:30px; padding:15px; font-size:18px;">
                    <i class="fa fa-download"></i> Download APK
                </a>
            `;
            document.getElementById('app-modal').style.display = "flex";
        }

        function closeModal() { document.getElementById('app-modal').style.display = "none"; }

        function searchApps() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = apps.filter(a => a.name.toLowerCase().includes(query));
            displayApps(filtered);
        }

        function filterApps(cat) {
            const title = document.getElementById('cat-title');
            title.innerText = cat === 'All' ? "Featured Apps" : cat;
            const filtered = cat === 'All' ? apps : apps.filter(a => a.category === cat);
            displayApps(filtered);
            
            // Sidebar close on mobile
            if(window.innerWidth < 900) toggleMenu();
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Initial Load
        displayApps(apps);
    </script>
</body>
</html>
